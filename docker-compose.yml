name: edge-face-capture

services:
  backend:
    build:
      context: ./backend
    # IMAGE_TAG is set by bitBucketUpdate.sh to the current git commit SHA so
    # prebuilt CI images are matched exactly; defaults to latest for manual use.
    image: ghcr.io/tejeet/nb_rtspface-backend:${IMAGE_TAG:-latest}
    container_name: efc-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - STORAGE_ROOT=/app/storage
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - efc-storage:/app/storage
      # Models pre-downloaded by bitBucketUpdate.sh on the host; shadows the
      # volume's models dir so the backend never downloads at startup.
      - ./models:/app/storage/models
      # --- Radxa Cubie A7Z / NPU boards: uncomment so the dashboard can read
      # --- NPU utilization from the kernel debug nodes.
      # - /sys/kernel/debug:/sys/kernel/debug:ro
    # Accelerators: uncomment the line for the hardware actually fitted.
    # devices:
    #   - /dev/hailo0:/dev/hailo0     # Hailo-8 PCIe (INFERENCE_BACKEND=hailo)
    #   - /dev/galcore:/dev/galcore   # VeriSilicon NPU (INFERENCE_BACKEND=npu)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
    image: ghcr.io/tejeet/nb_rtspface-frontend:${IMAGE_TAG:-latest}
    container_name: efc-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${DASHBOARD_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  efc-storage:
    name: efc-storage
