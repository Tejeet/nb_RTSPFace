name: edge-face-capture

services:
  backend:
    build:
      context: ./backend
    image: edge-face-capture-backend:latest
    container_name: efc-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - STORAGE_ROOT=/app/storage
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - efc-storage:/app/storage
      # Models pre-downloaded by bitBucketUpdate.sh on the host; shadows the
      # volume's models dir so the backend never downloads at startup.
      - ./models:/app/storage/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
    image: edge-face-capture-frontend:latest
    container_name: efc-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${DASHBOARD_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  efc-storage:
    name: efc-storage
